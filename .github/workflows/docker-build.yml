name: docker-build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t vendorverdict:ci .
      - name: Smoke test health check inside container image
        run: docker run --rm --entrypoint vendorverdict vendorverdict:ci --health
