# Apache reverse proxy for VendorVerdict on a Google Compute Engine VM.
# Replace vendorverdict.example.com with your real subdomain, for example:
# vendorverdict.docoply.com

<VirtualHost *:80>
    ServerName vendorverdict.example.com

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog ${APACHE_LOG_DIR}/vendorverdict-error.log
    CustomLog ${APACHE_LOG_DIR}/vendorverdict-access.log combined
</VirtualHost>
