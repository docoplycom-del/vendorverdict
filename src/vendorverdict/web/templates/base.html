<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}VendorVerdict{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/dashboard">
      <span class="brand-mark">VV</span>
      <span>
        <strong>VendorVerdict</strong>
        <small>AI procurement analyst</small>
      </span>
    </a>
    <nav>
      <a href="/dashboard">Reports</a>
      <a href="/reviews/new">New review</a>
      <a href="/docs">API docs</a>
      <a href="/health">Health</a>
      {% if auth and auth.enabled %}
        {% if auth.is_authenticated %}
          <span class="nav-user">{{ auth.username }}</span>
          <a href="/logout">Logout</a>
        {% else %}
          <a href="/login">Login</a>
        {% endif %}
      {% endif %}
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
