services:
  vendorverdict:
    build: .
    container_name: vendorverdict-agent
    env_file:
      - .env
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vendorverdict", "--health"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s
