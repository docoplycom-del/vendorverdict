services:
  vendorverdict:
    build: .
    container_name: vendorverdict-agent
    env_file:
      - .env
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vendorverdict", "--health"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s


  vendorverdict-api:
    build: .
    container_name: vendorverdict-api
    env_file:
      - .env
    command: ["vendorverdict-api", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=10).read()"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s
